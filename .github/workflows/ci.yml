name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # Rails の慣習上 backend の RSpec は実 DB (MySQL) 込みで走る (ADR-021:
  # SQLite/Mock では照合順序・SQL方言の本番バグを検出できない)。
  # スイートは軽量 (~90例/数秒) なので Integration 込みでも高速に回る
  backend:
    name: backend (RSpec + MySQL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # ローカルの compose.yaml と同じ MySQL 8.4 / 資格情報
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: uprun_test
          MYSQL_USER: uprun
          MYSQL_PASSWORD: uprunpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      # ActiveStorage の variant 用 (image_processing / vips)
      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libvips

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: backend
          bundler-cache: true

      # 静的検査 (DB 不要・数秒)。スタイル違反は早い段階で落とす
      - name: RuboCop
        run: bundle exec rubocop

      - name: Load schema
        run: bin/rails db:test:prepare

      - name: Run RSpec
        run: bundle exec rspec

  frontend:
    name: frontend (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      - name: Test (vitest)
        run: npm test
