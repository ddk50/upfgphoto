# 全環境 MySQL 8 (adapter: trilogy) に統一 (ADR-021)。
# dev/test も本番と同一エンジンにして方言差のバグ (照合順序・型) を潰す。
# ローカルは backend/compose.yaml の MySQL コンテナを使う。
# ※ 旧システムからの ETL 入力 (production.sqlite3) の読み取りには sqlite3 gem を引き続き使用
default: &default
  adapter: trilogy
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST") { "127.0.0.1" } %>
  port: <%= ENV.fetch("DB_PORT") { 3306 } %>
  username: <%= ENV.fetch("DB_USERNAME") { "uprun" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "uprunpass" } %>

development:
  <<: *default
  database: uprun_development

test:
  <<: *default
  database: uprun_test

staging:
  <<: *default
  database: <%= ENV.fetch("DB_NAME") { "uprun_staging" } %>

production:
  <<: *default
  database: <%= ENV.fetch("DB_NAME") { "uprun_production" } %>
  password: <%= ENV["DB_PASSWORD"] %>
